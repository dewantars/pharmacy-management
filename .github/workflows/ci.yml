name: CI Pipeline

on:
push:
branches: [ "main" ]
pull_request:
branches: [ "main" ]

jobs:
build-and-test:
runs-on: ubuntu-latest

```
steps:
  # 1. Checkout code
  - name: Checkout repository
    uses: actions/checkout@v4

  # 2. Setup Node.js
  - name: Setup Node.js
    uses: actions/setup-node@v4
    with:
      node-version: 20
      cache: 'npm'

  # 3. Install dependencies
  - name: Install dependencies
    run: npm ci

  # 4. Generate Prisma Client
  - name: Generate Prisma Client
    run: npx prisma generate

  # 5. Build project
  - name: Build project
    run: npm run build

  # 6. Run tests
  - name: Run tests
    run: npm run test
```
